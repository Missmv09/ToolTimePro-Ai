[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

# ============================================================
# Sandbox / staging branch deploy
# The `sandbox` branch gets its own build context so you can
# point it at a second Supabase project and Stripe test keys
# via Netlify's branch-scoped environment variables.
# Set branch-scoped vars in Netlify UI: Site settings →
# Environment variables → "Specific scopes" → branch = sandbox.
# See docs/SANDBOX.md for the full runbook.
# ============================================================
[context.sandbox]
  command = "npm run build"

[context.sandbox.environment]
  NEXT_PUBLIC_APP_ENV = "sandbox"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

# Note: API routes are handled automatically by @netlify/plugin-nextjs
# Do NOT add redirects for /api/* as they interfere with Next.js App Router

# ============================================================
# Scheduled Functions (Cron Jobs)
# These call internal API routes on a schedule.
# Netlify runs them as background functions.
# ============================================================

# Jenny Autonomous Actions — runs every 15 minutes
# Checks for: unassigned jobs, cold leads to follow up,
# overdue invoices, completed jobs needing cost analysis
[functions."jenny-actions-cron"]
  schedule = "*/15 * * * *"

# HR Law Update Check — runs every Monday at 8am UTC
# Checks state employment law freshness (wages, classification, breaks)
# Alerts when compliance rules are older than 6 months
[functions."hr-law-update-cron"]
  schedule = "0 8 * * 1"

# Workforce Compliance — runs every Monday at 7am UTC
# Checks: cert expirations, insurance expiry, missing W-9s,
# classification review cycles, contract end dates
[functions."workforce-compliance-cron"]
  schedule = "0 7 * * 1"

# Daily Business Checks — runs every day at 7am UTC
# Checks: quote expirations, contractor payment approvals,
# compliance alert escalation, review requests
[functions."daily-business-cron"]
  schedule = "0 7 * * *"

# Trial Reminders — runs once per day at 9am UTC
# Sends trial welcome, reminder, and expiration emails
[functions."trial-reminders-cron"]
  schedule = "0 9 * * *"

# Supabase Keep-Alive — runs every 3 days at 6am UTC
# Pings Supabase to prevent free-tier project from pausing (7-day inactivity limit)
[functions."supabase-keepalive-cron"]
  schedule = "0 6 */3 * *"
