name: Auto-Update Wiki & Crisp Helpdesk

# Triggers when source-of-truth files change on main
on:
  push:
    branches: [main]
    paths:
      # Pricing / product catalog changes
      - 'scripts/stripe-products.js'
      - 'scripts/setup-stripe-products.js'
      - 'src/lib/stripe-prices.js'
      # API route changes
      - 'src/app/api/**/route.*'
      # CRM import / field mapping changes
      - 'src/lib/crm-field-mappings.ts'
      - 'src/app/dashboard/import-customers/**'
      # Cron / function changes
      - 'netlify.toml'
      - 'netlify/functions/**'
      # Manual wiki edits (still sync to Crisp)
      - 'wiki/**'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 1: Regenerate wiki pages from source code.
      # Output is published to the GitHub Wiki tab below; we intentionally do
      # NOT commit it back to main. main is protected by a ruleset (changes
      # must go through a PR), so a bot push would be rejected. The in-repo
      # wiki/ files are kept current by devs via normal PRs, and the
      # wiki-staleness check nags on PRs when source drifts from wiki/.
      - name: Generate wiki content from source code
        run: node scripts/generate-wiki.js

      # Step 2: Sync the freshly generated wiki/ directory to the GitHub Wiki
      # tab. The wiki is a separate git repo, so the main branch ruleset does
      # not apply here.
      # Requires: wiki must be initialized (create one page via GitHub UI first)
      # Uses GH_PAT secret if available for wiki push access; falls back to GITHUB_TOKEN
      - name: Sync to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: wiki/
          token: ${{ secrets.GH_PAT || github.token }}
